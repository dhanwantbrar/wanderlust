version: '3.9'

services:
  mongo:
    image: mongo:latest
    container_name: mongo
    volumes:
      - ./backend/data:/data  
    ports:
      - "27017:27017"

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    depends_on:
      - mongo
    

  backend:
    container_name: backend
    build: ./backend
    env_file:
      - ./backend/.env.sample
    ports: 
      - "8080:8080"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"

volumes:
  data:
